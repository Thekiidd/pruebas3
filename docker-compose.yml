services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opendev
      POSTGRES_PASSWORD: opendev
      POSTGRES_DB: opendev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
